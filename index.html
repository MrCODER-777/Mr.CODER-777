<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: #030611 url('Background.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            perspective: 1000px;
        }

        .content-wrapper {
            margin-left: 8%;
            width: 550px;
            height: 600px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
        }

        /* 3D HEADLINE */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #4c1d95 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #4c1d95, 0 2px 0 #4c1d95, 0 3px 0 #3b0764, 0 4px 0 #3b0764, 0 5px 0 #2e1065, 0 10px 20px rgba(0,0,0,0.4);
            animation: float3D 5s ease-in-out infinite;
            transform-style: preserve-3d;
            display: inline-block;
        }

        @keyframes float3D {
            0%, 100% { transform: rotateY(-15deg) rotateX(10deg); }
            50% { transform: rotateY(15deg) rotateX(-5deg); }
        }

        .socials { display: flex; gap: 25px; margin-bottom: 50px; }
        .socials a { font-size: 2rem; transition: 0.3s; }
        .yt { color: #FF0000; } .fb { color: #1877F2; } .gh { color: #ffffff; }

        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            margin-bottom: 25px;
        }

        #typing-area {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 1.8rem;
            line-height: 1.6;
            position: relative;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
        }

        /* FIXED PEN STYLING */
        #pen {
            position: absolute;
            font-size: 2.2rem;
            display: inline-block;
            pointer-events: none;
            /* Remove fixed bottom/left to let script handle it */
            z-index: 10;
            line-height: 1;
            /* Smooth micro-movements */
            transition: transform 0.05s linear; 
            will-change: transform;
        }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #a855f7;
            margin-bottom: 30px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=a855f7&color=fff'">
        <h1>Prabin Thapa</h1>
        <div class="socials">
            <a href="https://youtube.com/@allin1326" class="yt"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" class="fb"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" class="gh"><i class="fab fa-github"></i></a>
        </div>
        <div class="about-section">
            <div class="about-label">About Me</div>
            <div id="typing-area">
                <span id="text-target"></span><span id="pen">🖋️</span>
            </div>
        </div>
    </div>

    <script>
        const details = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences.";
        const target = document.getElementById("text-target");
        const pen = document.getElementById("pen");
        let index = 0;

        function type() {
            if (index < details.length) {
                const char = details.charAt(index);
                target.textContent += char;
                index++;

                // Physics-based rotation: tilts more on tall letters
                let tilt = -15;
                let yOffset = 0;

                if (/[A-Z|t|l|d|k|f|h]/.test(char)) {
                    tilt = -25; // Tilt back for tall letters
                    yOffset = -5;
                } else if (/[g|j|p|q|y]/.test(char)) {
                    tilt = -10; // Flatter for letters with tails
                    yOffset = 5;
                }

                // Directly set the transform to avoid CSS conflicts
                pen.style.transform = `rotate(${tilt}deg) translateY(${yOffset}px)`;

                let speed = Math.random() * 50 + 50;
                if (char === " ") speed = 120;
                if (char === ".") speed = 700;

                setTimeout(type, speed);
            } else {
                // Fade out smoothly when done
                pen.style.transition = "opacity 1s ease";
                pen.style.opacity = "0";
            }
        }

        window.onload = () => {
            // Short delay before starting to ensure fonts are loaded
            setTimeout(type, 1000);
        };
    </script>
</body>
</html>
