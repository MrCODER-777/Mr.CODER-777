<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* 1. Background Image with Full Brightness */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center; /* Vertical Middle */
            justify-content: flex-start; /* Horizontal Left */
            overflow: hidden;
        }

        /* 2. THE CARD - Translucent and Animated */
        .glass-card {
            margin-left: 10%; /* Spacing from left edge */
            
            /* Glassmorphism Fix for Visibility on Bright Backgrounds */
            background: rgba(0, 0, 0, 0.4); /* Reduced to a very subtle 0.4 opacity dark layer */
            backdrop-filter: blur(10px); /* The "frosted glass" blur effect */
            -webkit-backdrop-filter: blur(10px); /* Webkit support (Safari) */
            
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle white border */
            border-radius: 30px;
            padding: 50px 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            
            /* Ensures it stays in front of the background image */
            position: relative; 
            z-index: 100; 
            
            /* THE ENTRANCE ANIMATION */
            animation: fadeInSlideUp 1.2s ease-out;
        }

        /* 3. Entrance Animation Definition */
        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
