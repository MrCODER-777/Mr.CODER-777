<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background-color: #030611;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Flex ensures middle-left positioning */
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            /* Direct background image application */
            background: url('Background.jpg') no-repeat center center/cover;
        }

        /* THE CARD - Positioned with Margin */
        .glass-card {
            margin-left: 8%;
            position: relative;
            z-index: 999;
            
            /* High Contrast Transparency */
            background: rgba(10, 10, 20, 0.4); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 40px;
            padding: 50px 40px;
            width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            
            animation: slideIn 1s ease-out;
        }

        /* ATTRACTIVE SHINY NAME */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
            
            /* Purple & White Shiny Gradient */
            background: linear-gradient(90deg, #fff, #a855f7, #fff, #a855f7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.9));
        }

        /* TYPING AREA */
        .about-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(168, 85, 247, 0.3);
            text-align: left;
            min-height: 100px;
        }

        .about-label {
            color: #a855f7;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        #typing-content {
            color: #ffffff;
            font-size: 0.95rem;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .cursor {
            color: #a855f7;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        /* IMAGE & SOCIALS */
        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px solid #a855f7;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .socials a {
            color: #ffffff;
            background: rgba(168, 85, 247, 0.15);
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: 0.3s;
        }

        .socials a:hover {
            background: #a855f7;
            transform: translateY(-5px);
        }

        /* ANIMATIONS */
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 600px) {
            body { justify-content: center; }
            .glass-card { margin-left: 0; width: 92%; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=a855f7&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div class="about-box">
            <span class="about-label">About Me</span>
            <span id="typing-content"></span><span class="cursor">|</span>
        </div>
    </div>

    <script>
        const bio = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        let i = 0;
        const speed = 40; 

        function startTyping() {
            if (i < bio.length) {
                document.getElementById("typing-content").innerHTML += bio.charAt(i);
                i++;
                setTimeout(startTyping, speed);
            }
        }

        window.onload = startTyping;
    </script>

</body>
</html>
