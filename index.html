<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* 1. Full Brightness Background */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 2. THE CONTAINER - This ensures your details show up */
        .details-box {
            position: absolute;
            bottom: 40px; /* Distance from bottom */
            right: 40px;  /* Distance from right */
            
            background: rgba(15, 23, 42, 0.9); /* Dark background for visibility */
            backdrop-filter: blur(10px);
            border: 2px solid #38bdf8;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 9999; /* Forces this to be at the very front */
            animation: slideIn 0.8s ease-out;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .tagline {
            color: #38bdf8;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .socials a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .socials a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-5px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Mobile View */
        @media (max-width: 500px) {
            .details-box {
                bottom: 20px;
                right: 20px;
                left: 20px;
                width: auto;
            }
        }
    </style>
</head>

        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin
