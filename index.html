<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* FIXED BACKGROUND LAYER */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Replace Background.jpg with a lower res version if it still fails */
            background: url('Background.jpg') no-repeat center center;
            background-size: cover;
            -webkit-background-size: cover;
            z-index: -1;
            /* Fix for iOS Safari "jumpy" scrolling */
            will-change: transform;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            background-color: #030611;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            perspective: 1200px;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            margin-left: 8%;
            width: 550px;
            height: 600px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
        }

        /* 3D RAINBOW HEADLINE */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            background-size: 400% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 rgba(255,255,255,0.1), 0 2px 0 rgba(0,0,0,0.4), 0 3px 0 rgba(0,0,0,0.5), 0 4px 0 rgba(0,0,0,0.6), 0 10px 20px rgba(0,0,0,0.8);
            animation: rainbowFlow 8s linear infinite, float3D 5s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes rainbowFlow { 0% { background-position: 0% center; } 100% { background-position: 400% center; } }
        @keyframes float3D { 0%, 100% { transform: rotateY(-10deg) rotateX(5deg); } 50% { transform: rotateY(10deg) rotateX(-5deg); } }

        .socials { display: flex; gap: 25px; margin-bottom: 50px; }
        .socials a { font-size: 2rem; transition: 0.4s; }
        .yt { color: #FF0000; } .fb { color: #1877F2; } .gh { color: #ffffff; }

        .about-section { width: 100%; display: block; }
        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            margin-bottom: 15px;
            display: block;
        }

        #typing-area {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 1.8rem;
            line-height: 1.6;
            display: inline;
            position: relative;
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
        }

        #cursor-wrapper { display: inline-block; position: relative; width: 0; height: 0; vertical-align: baseline; }
        #pen { position: absolute; font-size: 2.2rem; bottom: -5px; left: -10px; transform: rotate(-15deg); white-space: nowrap; pointer-events: none; transition: transform 0.1s ease; }

        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .content-wrapper { margin-left: 5%; width: 90%; margin-top: 20px; }
            #typing-area { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <div class="content-wrapper">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=333&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" class="yt" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" class="fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" class="gh" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div class="about-section">
            <span class="about-label">About Me</span>
            <div id="typing-area">
                <span id="text-target"></span><span id="cursor-wrapper"><span id="pen">🖋️</span></span>
            </div>
        </div>
    </div>

    <script>
        const details = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        const target = document.getElementById("text-target");
        const pen = document.getElementById("pen");
        let index = 0;

        function type() {
            if (index < details.length) {
                const char = details.charAt(index);
                target.innerHTML += char;
                index++;
                if (/[A-Z|t|l|d|k|f|h]/.test(char)) {
                    pen.style.transform = "rotate(-22deg) translateY(-4px)";
                } else if (/[g|j|p|q|y]/.test(char)) {
                    pen.style.transform = "rotate(-10deg) translateY(4px)";
                } else {
                    pen.style.transform = "rotate(-15deg) translateY(0px)";
                }
                let speed = Math.random() * 40 + 40;
                if (char === " ") speed = 100;
                if (char === ".") speed = 600;
                setTimeout(type, speed);
            } else {
                pen.style.transition = "opacity 0.6s ease";
                pen.style.opacity = "0";
            }
        }
        window.onload = () => { setTimeout(type, 1000); };
    </script>
</body>
</html>
