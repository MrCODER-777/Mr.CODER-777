<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background-color: #030611;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center; 
            justify-content: flex-start; 
            overflow: hidden;
            position: relative;
        }

        /* Full Brightness Background Layer */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        /* THE ULTRA-TRANSPARENT CARD */
        .glass-card {
            margin-left: 8%; 
            /* Set to 0.1 for maximum transparency */
            background: rgba(255, 255, 255, 0.1); 
            
            /* High blur makes it look like real glass */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            /* Bright border helps define the shape on a transparent background */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 60px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            
            position: relative;
            z-index: 1000; 
            
            /* Smooth float animation */
            animation: slideInLeft 1.2s cubic-bezier(0.16, 1, 0.3, 1), float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5));
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            font-size: 2.4rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* Shadow ensures text is readable on white */
        }

        .tagline {
            color: #38bdf8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .social-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

            color: white;
            background: rgba(255, 255, 255, 0.15);
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; /* Circle icons for a cleaner look */
            text-decoration: none;
