<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Prabin Thapa | Official Website</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); /* Made slightly transparent for the background */
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            /* Added your Background.jpg here */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        /* Hero Section Styling */
        .masthead {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05); /* Soft glass effect */
            backdrop-filter: blur(10px); /* Blurs the background image behind the card */
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease-in-out;
            max-width: 500px;
            width: 90%;
        }

        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
        }

        .masthead-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s ease;
        }

        .masthead-avatar:hover {
            transform: scale(1.05);
        }

        .masthead-heading {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .masthead-subheading {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Social Icons */
        nav.social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-links a {
            color: var(--text-primary);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-links a:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            background: rgba(56, 189, 248, 0.1);
        }
