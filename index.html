<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* 1. Background Image with Full Brightness */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center; /* Vertical Middle */
            justify-content: flex-start; /* Horizontal Left */
            overflow: hidden;
        }

        /* 2. THE CARD - Positioned Middle-Left */
        .glass-card {
            margin-left: 10%; /* Spacing from left edge */
            background: rgba(15, 23, 42, 0.8); /* Darker for text readability */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            
            /* 3. THE CRITICAL FIX: Z-INDEX */
            position: relative; 
            z-index: 100; /* Forces it to the front of the background */
            
            animation: slideIn 1s ease-out;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .tagline {
            color: #38bdf8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .social-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-nav a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-nav a:hover {
            background: #38bdf8;
            color: #000;
            transform: translateY(-5px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsive Mobile View */
        @media (max-width: 600px) {
            body { justify-content: center; }
            .glass-card { margin-left: 0; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=38bdf8&color=fff&size=128'">
        
        <h1>Prabin Thapa</h1>
        <div class="tagline">Digital Explorer & Learner</div>
        
        <nav class="social-nav">
            <a href="https://youtube.com/@allin1326" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" target="_blank"><i class="fab fa-github"></i></a>
        </nav>
    </div>

</body>
</html>
