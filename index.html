<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* Your background image is the only background now */
            background: #030611 url('Background.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* CONTAINER: No box, No glass, No borders */
        .content-wrapper {
            margin-left: 8%;
            width: 550px;
            /* Fixed height area to keep details over the background stable */
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Aligned left for a professional look */
            padding: 20px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #38bdf8, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .socials {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .socials a {
            color: white;
            font-size: 1.4rem;
            transition: 0.3s;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
        }

        .socials a:hover { color: #38bdf8; transform: scale(1.2); }

        .about-section {
            width: 100%;
        }

        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #typing-area {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 1.8rem;
            line-height: 1.6;
            display: inline;
            position: relative;
            /* Text shadow is essential when there is no box, to keep text readable */
            text-shadow: 0 2px 15px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.5);
        }

        #cursor-wrapper {
            display: inline-block;
            position: relative;
            width: 0; height: 0;
            vertical-align: baseline;
        }

        #pen {
            position: absolute;
            font-size: 2.2rem;
            bottom: -5px; 
            left: -10px;
            transform: rotate(-15deg);
            white-space: nowrap;
            pointer-events: none;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        @keyframes shine { to { background-position: 200% center; } }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .content-wrapper { margin-left: 5%; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=38bdf8&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div class="about-section">
            <span class="about-label">About Me</span>
            <div id="typing-area">
                <span id="text-target"></span><span id="cursor-wrapper"><span id="pen">🖋️</span></span>
            </div>
        </div>
    </div>

    <script>
        const details = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        const target = document.getElementById("text-target");
        const pen = document.getElementById("pen");
        let index = 0;

        function type() {
            if (index < details.length) {
                const char = details.charAt(index);
                target.innerHTML += char;
                index++;

                // Subtle Pen Movement
                if (/[A-Z|t|l|d|k|f|h]/.test(char)) {
                    pen.style.transform = "rotate(-22deg) translateY(-4px)";
                } else if (/[g|j|p|q|y]/.test(char)) {
                    pen.style.transform = "rotate(-10deg) translateY(4px)";
                } else {
                    pen.style.transform = "rotate(-15deg) translateY(0px)";
                }

                let speed = Math.random() * 40 + 40;
                if (char === " ") speed = 100;
                if (char === ".") speed = 600;

                setTimeout(type, speed);
            } else {
                pen.style.transition = "opacity 0.6s ease";
                pen.style.opacity = "0";
            }
        }

        window.onload = () => {
            setTimeout(type, 1000);
        };
    </script>

</body>
</html>
