<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: #030611 url('Background.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* GLASS CARD: Transparent background, fixed height */
        .glass-card {
            margin-left: 8%;
            background: rgba(255, 255, 255, 0.0); /* 100% Transparent */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 6px solid #ff4d4d; /* Signature Red Line */
            border-radius: 0 40px 40px 0;
            padding: 50px;
            width: 550px;
            height: 600px; /* Fixed height to stop expansion */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.4rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, #38bdf8, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .socials a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }

        .socials a:hover { background: #38bdf8; transform: scale(1.1); }

        /* ABOUT SECTION: No frame, fixed height */
        .about-container {
            text-align: left;
            width: 100%;
            padding-top: 10px;
            flex-grow: 1; /* Takes up remaining space */
            position: relative;
        }

        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 15px;
            display: block;
        }

        #typing-area {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 1.7rem;
            line-height: 1.6;
            display: inline;
            position: relative;
        }

        #cursor-wrapper {
            display: inline-block;
            position: relative;
            width: 0; height: 0;
            vertical-align: baseline;
        }

        #pen {
            position: absolute;
            font-size: 2rem;
            bottom: -5px; 
            left: -10px;
            transform: rotate(-15deg);
            white-space: nowrap;
            pointer-events: none;
            transition: transform 0.1s ease;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .profile-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            margin-bottom: 25px;
            object-fit: cover;
            flex-shrink: 0; /* Prevents image from shrinking */
        }

        @media (max-width: 600px) {
            .glass-card { margin-left: 0; width: 95%; height: auto; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=38bdf8&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div class="about-container">
            <span class="about-label">About Me</span>
            <div id="typing-area">
                <span id="text-target"></span><span id="cursor-wrapper"><span id="pen">🖋️</span></span>
            </div>
        </div>
    </div>

    <script>
        const details = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        const target = document.getElementById("text-target");
        const pen = document.getElementById("pen");
        let index = 0;

        function type() {
            if (index < details.length) {
                const char = details.charAt(index);
                target.innerHTML += char;
                index++;

                // Subtle Pen Movement
                if (/[A-Z|t|l|d|k|f|h]/.test(char)) {
                    pen.style.transform = "rotate(-22deg) translateY(-4px)";
                } else if (/[g|j|p|q|y]/.test(char)) {
                    pen.style.transform = "rotate(-10deg) translateY(4px)";
                } else {
                    pen.style.transform = "rotate(-15deg) translateY(0px)";
                }

                let speed = Math.random() * 40 + 40;
                if (char === " ") speed = 110;
                if (char === ".") speed = 600;

                setTimeout(type, speed);
            } else {
                pen.style.transition = "opacity 0.5s ease";
                pen.style.opacity = "0";
            }
        }

        window.onload = () => {
            setTimeout(type, 1000);
        };
    </script>

</body>
</html>
