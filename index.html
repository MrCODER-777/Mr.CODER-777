<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* Full Brightness Background */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center; /* Centers vertically (Middle) */
            justify-content: flex-start; /* Aligns to the left */
        }

        /* THE CONTAINER - Positioned Middle-Left */
        .details-box {
            margin-left: 60px; /* Distance from the left edge */
            background: rgba(15, 23, 42, 0.85); /* Darker semi-transparent box for text visibility */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 999; /* Ensures it sits ON TOP of the background image */
            animation: slideInLeft 1s ease-out;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .tagline {
            color: #38bdf8;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .socials a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.3rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .socials a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-5px) scale(1.1);
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }
