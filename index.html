<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Creative Showcase</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #38bdf8;
            --magenta: #ec4899;
            --gold: #f59e0b;
            --bg: #030611;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* Essential for 3D Tilt */
        }

        /* 1. Animated Mesh Background Orbs */
        .universe {
            position: fixed;
            width: 100vw; height: 100vh;
            z-index: -2;
            filter: blur(80px);
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            animation: orbMove 15s infinite alternate ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--cyan); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: var(--magenta); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--gold); top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* 2. Particle Canvas (Optional, needs JavaScript, but CSS particles work too) */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            z-index: -1;
        }
