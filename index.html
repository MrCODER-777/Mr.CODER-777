<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            /* Full brightness background - no dark overlay */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevents scrollbars if image is large */
        }

        /* Positioning the card in the bottom-right corner */
        .glass-card {
            position: absolute;
            bottom: 40px;
            right: 40px;
            
            /* Glass effect with higher contrast to stay readable on bright backgrounds */
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 35px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideIn 1s ease-out;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
        }

        .tagline {
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            margin: 8px 0 25px;
            font-weight: 700;
        }

        .social-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-nav a {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .social-nav a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(1.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .glass-card {
                bottom: 20px;
                right: 20px;
                left: 20px; /* Center it on small phones */
                width: auto;
            }
        }
    </style>
</head>
