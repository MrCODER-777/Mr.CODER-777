<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            /* FALLBACK: If Background.jpg is missing, this dark blue shows up instead */
            background: #030611 linear-gradient(135deg, #030611 0%, #0a0a2e 100%);
            /* PRIMARY: Your actual image */
            background-image: url('Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow: hidden;
        }

        .glass-card {
            margin-left: 8%;
            position: relative;
            z-index: 9999;
            
            /* High visibility transparency */
            background: rgba(15, 15, 25, 0.7); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
            border-left: 5px solid #ff4d4d; /* Red Accent */
            
            animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ATTRACTIVE NAME - Chrome Blue */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.6rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 15px;
            
            background: linear-gradient(90deg, #fff, #38bdf8, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        /* ABOUT ME - Shiny Red */
        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 900;
            margin-bottom: 15px;
            display: block;
            
            background: linear-gradient(90deg, #ff4d4d, #ffffff, #ff4d4d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        #typing-text {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 400;
        }

        .cursor {
            color: #ff4d4d;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        .profile-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 4px solid #ff4d4d;
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .socials a {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            font-size: 1.4rem;
        }

        .socials a:hover {
            background: #ff4d4d;
            transform: translateY(-5px);
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 600px) {
            body { justify-content: center; }
            .glass-card { margin-left: 0; width: 92%; padding: 40px 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=ff4d4d&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div style="text-align: left; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <span class="about-label">About Me</span>
            <span id="typing-text"></span><span class="cursor">|</span>
        </div>
    </div>

    <script>
        const bioText = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        let charIndex = 0;

        function type() {
            const target = document.getElementById("typing-text");
            if (target && charIndex < bioText.length) {
                target.innerHTML += bioText.charAt(charIndex);
                charIndex++;
                setTimeout(type, 40);
            }
        }
        window.onload = type;
    </script>

</body>
</html>
