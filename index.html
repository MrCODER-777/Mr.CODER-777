<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabin Thapa | Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: #030611 url('Background.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .content-wrapper {
            margin-left: 8%;
            width: 550px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
            perspective: 1200px;
        }

        /* 3D HEADLINE: Dark Purple with Dark Outline */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            
            /* Deep Purple Gradient */
            background: linear-gradient(to bottom, #4c1d95, #2e1065);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* THE DARK OUTLINER */
            -webkit-text-stroke: 1.5px #1a0633; 
            
            /* Enhanced Dark 3D Shadows */
            text-shadow: 
                0 1px 0 #2e1065,
                0 2px 0 #1e1b4b,
                0 3px 0 #1a0633,
                0 4px 0 #000,
                0 10px 20px rgba(0,0,0,0.9);
            
            animation: float3D 5s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float3D {
            0%, 100% { transform: rotateY(-10deg) rotateX(5deg) translateY(0); }
            50% { transform: rotateY(10deg) rotateX(-5deg) translateY(-15px); }
        }

        .socials {
            display: flex;
            gap: 25px;
            margin-bottom: 40px;
        }

        .socials a { font-size: 1.8rem; transition: 0.3s; }
        .socials a:hover { transform: scale(1.3) rotate(8deg); }

        .yt { color: #FF0000; filter: drop-shadow(0 2px 8px rgba(255,0,0,0.4)); }
        .fb { color: #1877F2; filter: drop-shadow(0 2px 8px rgba(24,119,242,0.4)); }
        .gh { color: #ffffff; filter: drop-shadow(0 2px 8px rgba(255,255,255,0.4)); }

        .about-label {
            font-family: 'Montserrat', sans-serif;
            color: #ff4d4d;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 900;
            margin-bottom: 20px;
            display: block;
        }

        #typing-area {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 1.8rem;
            line-height: 1.6;
            display: inline;
            position: relative;
            text-shadow: 0 2px 15px rgba(0,0,0,1);
        }

        #pen {
            position: absolute;
            font-size: 2.2rem;
            bottom: -5px; 
            left: -10px;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 4px solid #2e1065; 
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .content-wrapper { margin-left: 5%; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <img src="prabinthapa.jpg" class="profile-img" alt="Prabin" 
             onerror="this.src='https://ui-avatars.com/api/?name=Prabin+Thapa&background=2e1065&color=fff'">
        
        <h1>Prabin Thapa</h1>
        
        <div class="socials">
            <a href="https://youtube.com/@allin1326" class="yt" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/prabinthapa77777" class="fb" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://github.com/MrCODER-777" class="gh" target="_blank"><i class="fab fa-github"></i></a>
        </div>

        <div class="about-section">
            <span class="about-label">About Me</span>
            <div id="typing-area">
                <span id="text-target"></span><span id="cursor-wrapper"><span id="pen">🖋️</span></span>
            </div>
        </div>
    </div>

    <script>
        const details = "I am a Digital Explorer and Creative Learner. Passionate about coding, content creation, and building unique digital experiences. Always seeking new ways to innovate and grow.";
        const target = document.getElementById("text-target");
        const pen = document.getElementById("pen");
        let index = 0;

        function type() {
            if (index < details.length) {
                const char = details.charAt(index);
                target.innerHTML += char;
                index++;

                if (/[A-Z|t|l|d|k|f|h]/.test(char)) {
                    pen.style.transform = "rotate(-22deg) translateY(-4px)";
                } else if (/[g|j|p|q|y]/.test(char)) {
                    pen.style.transform = "rotate(-10deg) translateY(4px)";
                } else {
                    pen.style.transform = "rotate(-15deg) translateY(0px)";
                }

                let speed = Math.random() * 40 + 40;
                if (char === " ") speed = 100;
                if (char === ".") speed = 600;

                setTimeout(type, speed);
            } else {
                pen.style.transition = "opacity 0.6s ease";
                pen.style.opacity = "0";
            }
        }

        window.onload = () => {
            setTimeout(type, 1000);
        };
    </script>

</body>
</html>
