<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Prabin Thapa | Official Website</title>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }

        /* Hero Section Styling */
        .masthead {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.5s ease-in-out;
        }

        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
        }

        .masthead-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s ease;
        }

        .masthead-avatar:hover {
            transform: scale(1.05);
        }

        .masthead-heading {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .masthead-subheading {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Social Icons */
        nav.social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-links a {
            color: var(--text-primary);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-links a:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            background: rgba(56, 189, 248, 0.1);
        }

        /* Footer */
        .copyright {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .masthead-heading { font-size: 2.5rem; }
        }
    </style>
</head>
<body id="page-top">

    <header class="masthead">
        <div class="avatar-container">
            <!-- Ensure prabinthapa.jpg is in the same folder as this file -->
            <img class="masthead-avatar" src="prabinthapa.jpg" alt="Prabin Thapa" onerror="this.src='https://via.placeholder.com/180?text=PT'"/>
        </div>
        
        <h1 class="masthead-heading">Prabin Thapa</h1>
        <p class="masthead-subheading">Digital Explorer & Learner</p>
        
        <nav class="social-links">
            <a href="https://youtube.com/@allin1326" target="_blank" title="YouTube">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://facebook.com/prabinthapa77777" target="_blank" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://github.com/MrCODER-777" target="_blank" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </nav>
    </header>

    <div class="copyright">
        <small>Copyright &copy; 2026 Prabin Thapa | Built with ❤️</small>
    </div>

</body>
</html>
